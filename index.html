<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Redirección HTML principal (Inmediata) -->
    <meta http-equiv="refresh" content="0; url=https://cesarleyto.carrd.co/">
    
    <!-- Título que aparece en la pestaña por un milisegundo -->
    <title>Redirecting to César Leyto's Portfolio...</title>
    
    <!-- Le dice a Google que no indexe esta página vacía, sino tu Carrd -->
    <meta name="robots" content="noindex, follow">
    
    <!-- Redirección JavaScript (Seguro de respaldo por si el navegador bloquea la etiqueta meta) -->
    <script>
        window.location.replace("https://cesarleyto.carrd.co/");
    </script>

    <!-- Estilo minimalista en caso de que la conexión del usuario sea lentísima y alcance a ver la pantalla -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #111; /* Fondo oscuro elegante */
            color: #fff;
        }
        .container {
            text-align: center;
        }
        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>Redirecting to my portfolio...</p>
        <p>If you are not redirected automatically, <a href="https://cesarleyto.carrd.co/">click here</a>.</p>
    </div>
</body>
</html>
